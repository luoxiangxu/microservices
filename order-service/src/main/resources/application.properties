spring.application.name=ORDER-SERVICE

# ============================================
# SERVER
# ============================================
server.port=0

# ============================================
# EUREKA CLIENT
# ============================================
eureka.username=eureka
eureka.password=password
eureka.client.service-url.defaultZone=http://${eureka.username}:${eureka.password}@localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}

# ============================================
# MYSQL DATABASE
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/order_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=myuser
spring.datasource.password=myuser123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA
# ============================================
spring.jpa.database=mysql
spring.jpa.show-sql=true
# ✅ REMOVE - auto-detected
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# ============================================
# HIKARICP CONNECTION POOL
# ============================================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================
# ACTUATOR
# ============================================
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ============================================
# RESILIENCE4J - CIRCUIT BREAKER
# ============================================
resilience4j.circuitbreaker.instances.inventory.register-health-indicator=true
resilience4j.circuitbreaker.instances.inventory.event-consumer-buffer-size=10
resilience4j.circuitbreaker.instances.inventory.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.inventory.sliding-window-size=10
resilience4j.circuitbreaker.instances.inventory.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.inventory.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.inventory.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.inventory.automatic-transition-from-open-to-half-open-enabled=true

# ============================================
# RESILIENCE4J - TIMEOUT (INCREASED)
# ============================================
# ✅ Increased from 3s to 10s
resilience4j.timelimiter.instances.inventory.timeout-duration=10s
resilience4j.timelimiter.instances.inventory.cancel-running-future=true

# ============================================
# RESILIENCE4J - RETRY
# ============================================
resilience4j.retry.instances.inventory.max-attempts=3
resilience4j.retry.instances.inventory.wait-duration=5s
resilience4j.retry.instances.inventory.retry-exceptions=java.net.SocketTimeoutException,org.springframework.web.reactive.function.client.WebClientResponseException

# ============================================
# KAFKA PRODUCER
# ============================================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.template.default-topic=notificationTopic
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# ✅ Fixed type mapping
spring.kafka.producer.properties.spring.json.type.mapping=orderPlacedEvent:com.programmingtechie.order_service.event.OrderPlacedEvent

# ============================================
# KAFKA CONSUMER (Added)
# ============================================
spring.kafka.consumer.group-id=order-service-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.auto-offset-reset=earliest

# ============================================
# LOADBALANCER RETRY
# ============================================
spring.cloud.loadbalancer.retry.enabled=true
spring.cloud.loadbalancer.retry.maxRetriesOnSameServiceInstance=3
spring.cloud.loadbalancer.retry.maxRetriesOnNextServiceInstance=2

# ============================================
# WEBCLIENT
# ============================================
spring.webflux.client.max-in-memory-size=10MB

# ============================================
# LOGGING
# ============================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.orm.jpa=DEBUG
logging.level.org.springframework.transaction=DEBUG
logging.level.org.springframework.kafka=DEBUG
logging.level.com.netflix.discovery=DEBUG